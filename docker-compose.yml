services:
  db:
    image: postgres:16
    container_name: shs_db_container
    restart: always
    environment:
      - POSTGRES_USER=solar_admin
      - POSTGRES_PASSWORD=Webdev123
      - POSTGRES_DB=shs_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar_admin -d shs_db"]
      interval: 5s
      timeout: 5s
      retries: 5
